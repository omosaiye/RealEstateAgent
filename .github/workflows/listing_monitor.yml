name: Listing Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-listing-monitor:
    name: Run Listing Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LISTING_PROVIDER_API_KEY: ${{ secrets.LISTING_PROVIDER_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore SQLite state cache
        id: restore-listing-state
        uses: actions/cache/restore@v4
        with:
          path: listing_state.db
          key: listing-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            listing-state-${{ runner.os }}-${{ github.ref_name }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run listing monitor
        id: run-listing-monitor
        run: python -m src.main --log-level INFO

      - name: Save SQLite state cache
        if: ${{ always() && hashFiles('listing_state.db') != '' }}
        uses: actions/cache/save@v4
        with:
          path: listing_state.db
          key: listing-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
